<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vancouver Hike Profiles Visualization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom Scrollbar for dark theme */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6B7280; }
        .scrollable { scrollbar-width: thin; scrollbar-color: #4B5563 transparent; }

        /* Custom Checkbox Color */
        input[type="checkbox"]:checked {
            background-color: #3B82F6;
            border-color: #3B82F6;
        }

        /* Number input hide arrows */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen bg-gray-900 text-gray-200 overflow-hidden">

    <!-- Visualizer Container -->
    <main class="flex-1 relative flex flex-col h-2/3 md:h-full min-h-0">
        
        <!-- Modern HTML Region and Area Filter Panel -->
        <div id="filterRegionPanel" class="bg-gray-950 border-b border-gray-800 p-3 shrink-0 select-none z-30">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2 mb-2">
                <div>
                    <h1 class="text-xs sm:text-sm font-bold text-white flex items-center gap-1.5">
                        <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path>
                        </svg>
                        Vancouver Hike Profile Visualizer
                    </h1>
                    <p class="text-[9px] sm:text-[10px] text-gray-400 mt-0.5">
                        Toggle regions or individual areas to filter trails. Select paths to plot on the multi-dimensional effort canvas.
                    </p>
                </div>
                <div class="flex gap-2 shrink-0">
                    <button id="toggleAllOnBtn" class="px-2.5 py-1 bg-gray-800 hover:bg-gray-700 text-[10px] font-semibold text-gray-200 rounded border border-gray-700 hover:border-gray-600 transition-colors">
                        Show All
                    </button>
                    <button id="toggleAllOffBtn" class="px-2.5 py-1 bg-gray-800 hover:bg-gray-700 text-[10px] font-semibold text-gray-200 rounded border border-gray-700 hover:border-gray-600 transition-colors">
                        Hide All
                    </button>
                </div>
            </div>
            
            <!-- Dynamic Filters Flex Grid Wrapper -->
            <div id="regionFilters" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-7 gap-2 max-h-48 sm:max-h-none overflow-y-auto">
                <!-- Injected dynamically via JS based on current active dataset -->
            </div>
        </div>

        <!-- Canvas Container -->
        <div class="flex-1 relative min-h-0">
            <canvas id="vizCanvas" class="w-full h-full block cursor-crosshair"></canvas>
            
            <!-- Hover Tooltip -->
            <div id="tooltip" class="absolute pointer-events-none opacity-0 bg-gray-800 border border-gray-600 rounded p-3 shadow-2xl transition-opacity duration-150 z-30" style="min-width: 220px;"></div>
        </div>
    </main>

    <!-- Side Control Panel -->
    <aside class="w-full md:w-80 lg:w-96 bg-gray-800 border-t md:border-t-0 md:border-l border-gray-700 flex flex-col h-1/3 md:h-full z-20 shadow-2xl shrink-0 min-h-0">
        
        <!-- View Tabs -->
        <div class="flex border-b border-gray-700 bg-gray-900 shrink-0">
            <button id="tabExplore" onclick="switchTab('explore')" class="flex-1 py-3 text-sm font-semibold text-white border-b-2 border-blue-500 bg-gray-800 transition-colors focus:outline-none">Explore</button>
            <button id="tabManage" onclick="switchTab('manage')" class="flex-1 py-3 text-sm font-semibold text-gray-400 border-b-2 border-transparent hover:text-white transition-colors focus:outline-none">Manage Trails</button>
        </div>

        <!-- Shared / Unified Filter Logic Wrapper -->
        <!-- ================= EXPLORE VIEW ================= -->
        <div id="exploreView" class="flex flex-col flex-1 min-h-0">
            <!-- Search & Sort Controls -->
            <div class="p-3 border-b border-gray-700 shrink-0 flex flex-col gap-2 bg-gray-900/40">
                <div class="relative w-full">
                    <input type="text" id="searchInput" placeholder="Search trail names..." class="w-full bg-gray-900 text-white text-sm rounded pl-8 pr-3 py-2 border border-gray-600 focus:border-blue-500 focus:outline-none transition-colors">
                    <svg class="w-4 h-4 text-gray-400 absolute left-2.5 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>

            <!-- Pace & Time Estimator -->
            <div class="p-3 border-b border-gray-700 bg-gray-900/40 shrink-0 space-y-2">
                <div class="flex justify-between items-center">
                    <h3 class="text-xs uppercase font-semibold text-gray-400 tracking-wider">
                        Pace Benchmark
                    </h3>
                </div>
                <div class="grid grid-cols-12 gap-2 items-end">
                    <!-- Pace Multiplier Input -->
                    <div class="col-span-4">
                        <label class="block text-[10px] text-gray-400 mb-1 leading-none">Pace (by Effort)</label>
                        <input type="number" id="paceMinutes" value="0.85" step="0.01" min="0.1" class="w-full bg-gray-900 text-white text-xs rounded p-2 border border-gray-600 focus:border-blue-500 outline-none">
                    </div>
                    <!-- Auto Calibration selection -->
                    <div class="col-span-5">
                        <label class="block text-[10px] text-gray-400 mb-1 leading-none">Benchmark Trail</label>
                        <select id="calibrateHikeSelect" class="w-full bg-gray-900 text-white text-[11px] rounded p-2 border border-gray-600 outline-none cursor-pointer">
                            <option value="">Choose Trail...</option>
                            <!-- populated dynamically -->
                        </select>
                    </div>
                    <!-- Calibration Time Input -->
                    <div class="col-span-3">
                        <label class="block text-[10px] text-gray-400 mb-1 leading-none">Time (h)</label>
                        <input type="number" id="calibrateHours" step="0.1" min="0.1" placeholder="e.g. 4" class="w-full bg-gray-900 text-white text-xs rounded p-2 border border-gray-600 focus:border-blue-500 outline-none">
                    </div>
                </div>
            </div>
            
            <!-- Filters (Grid) -->
            <div class="p-3 border-b border-gray-700 bg-gray-800/50 shrink-0">
                <h3 class="text-xs uppercase font-semibold text-gray-400 mb-2 tracking-wider flex">
                    <span>Property Filters</span>
                    <span id="filterCount" class="bg-gray-600 text-white px-2 py-0.5 ml-1 rounded-full text-[11px]">0 found</span>
                </h3>
                <div class="grid grid-cols-2 gap-2">
                    <select id="filter-type" class="bg-gray-700 text-xs text-white p-1.5 rounded border border-gray-600 outline-none"><option value="">Type: All</option></select>
                    <select id="filter-distance" class="bg-gray-700 text-xs text-white p-1.5 rounded border border-gray-600 outline-none"><option value="">Distance (km): All</option></select>
                    <select id="filter-elevation" class="bg-gray-700 text-xs text-white p-1.5 rounded border border-gray-600 outline-none"><option value="">Elevation (m): All</option></select>
                    <select id="filter-hypotenuse" class="bg-gray-700 text-xs text-white p-1.5 rounded border border-gray-600 outline-none"><option value="">Climb (km): All</option></select>
                    <select id="filter-angle" class="bg-gray-700 text-xs text-white p-1.5 rounded border border-gray-600 outline-none"><option value="">Angle (&deg;): All</option></select>
                    <select id="filter-score" class="bg-gray-700 text-xs text-white p-1.5 rounded border border-gray-600 outline-none"><option value="">Effort: All</option></select>
                </div>
            </div>

            <!-- Selectable List -->
            <div class="flex">
                <select id="sortSelect" class="flex-1 bg-gray-700 text-xs text-white p-2 border border-gray-600 outline-none cursor-pointer">
                    <option value="name">Sort by: Name</option>
                    <option value="area">Sort by: Area</option>
                    <option value="distance">Sort by: Distance</option>
                    <option value="elevation">Sort by: Elevation</option>
                    <option value="angle">Sort by: Angle</option>
                    <option value="score">Sort by: Effort</option>
                    <option value="time">Sort by: Est. Time</option>
                </select>
                <button id="sortOrderBtn" class="bg-gray-900 hover:bg-gray-600 text-white p-2 border border-gray-600 flex items-center justify-center w-10 shrink-0 transition-colors" title="Toggle Sort Direction">
                    <span id="sortDirectionIcon" class="text-sm font-bold">↓</span>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-2 space-y-1 scrollable" id="hikeList">
                <!-- Dynamic Items Populate Here -->
            </div>

            <!-- Export Action -->
            <div class="p-3 border-t border-gray-700 bg-gray-800 shrink-0">
                <button id="exportBtn" class="w-full py-2 bg-blue-600 hover:bg-blue-500 text-white rounded font-medium text-sm transition-colors flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Export Image
                </button>
            </div>
        </div>

        <!-- ================= MANAGE VIEW ================= -->
        <div id="manageView" class="hidden flex flex-col flex-1 min-h-0">
            <!-- Form for Adding / Editing -->
            <div class="p-3 border-b border-gray-700 bg-gray-800/50 shrink-0 overflow-y-auto max-h-80">
                <h3 class="text-sm font-bold text-white mb-2 flex items-center justify-between">
                    <span id="formTitle">Add New Trail</span>
                    <button type="button" id="cancelEditBtn" class="hidden text-xs text-gray-400 hover:text-white transition-colors" onclick="resetForm()">Cancel Edit</button>
                </h3>
                <form id="trailForm" class="space-y-2">
                    <input type="hidden" id="trailId">
                    
                    <div>
                        <label class="block text-[10px] text-gray-400 mb-0.5">Name</label>
                        <input type="text" id="trailName" required placeholder="e.g., Grouse Grind" class="w-full bg-gray-900 text-white text-xs rounded px-2 py-1.5 border border-gray-600 focus:border-blue-500 outline-none">
                    </div>
                    
                    <div class="flex gap-2">
                        <div class="flex-1">
                            <label class="block text-[10px] text-gray-400 mb-0.5">Distance (km)</label>
                            <input type="number" step="0.1" min="0" id="trailDistance" required placeholder="2.9" class="w-full bg-gray-900 text-white text-xs rounded px-2 py-1.5 border border-gray-600 focus:border-blue-500 outline-none">
                        </div>
                        <div class="flex-1">
                            <label class="block text-[10px] text-gray-400 mb-0.5">Elevation Gain (m)</label>
                            <input type="number" step="1" min="0" id="trailElevation" required placeholder="853" class="w-full bg-gray-900 text-white text-xs rounded px-2 py-1.5 border border-gray-600 focus:border-blue-500 outline-none">
                        </div>
                    </div>
                    
                    <div class="flex gap-2">
                        <div class="flex-1">
                            <label class="block text-[10px] text-gray-400 mb-0.5">Area</label>
                            <select id="trailArea" required class="w-full bg-gray-900 text-white text-xs rounded px-2 py-1.5 border border-gray-600 focus:border-blue-500 outline-none">
                                <!-- Populated dynamically based on standard color key -->
                            </select>
                        </div>
                        <div class="flex-1">
                            <label class="block text-[10px] text-gray-400 mb-0.5">Type</label>
                            <select id="trailType" required class="w-full bg-gray-900 text-white text-xs rounded px-2 py-1.5 border border-gray-600 focus:border-blue-500 outline-none">
                                <option value="Out & Back">Out & Back</option>
                                <option value="Loop">Loop</option>
                                <option value="Point-to-Point">Point-to-Point</option>
                            </select>
                        </div>
                    </div>
                    
                    <button type="submit" class="w-full mt-1 bg-blue-600 hover:bg-blue-500 text-white py-1.5 rounded font-medium text-xs transition-colors">
                        Save Trail
                    </button>
                </form>
            </div>

            <!-- Manage Controls (Search & Sort) -->
            <div class="p-3 border-b border-gray-700 bg-gray-900/50 shrink-0">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-xs uppercase font-semibold text-gray-400 tracking-wider">
                        Search & Sort Database
                    </h3>
                    <span id="manageFilterCount" class="bg-gray-600 text-white px-2 py-0.5 rounded-full text-[10px]">0</span>
                </div>
                <!-- Search & Sort Layout -->
                <div class="space-y-2">
                    <div class="relative w-full">
                        <input type="text" id="manageSearchInput" placeholder="Search manageable..." class="w-full bg-gray-900 text-white text-xs rounded pl-8 pr-3 py-1.5 border border-gray-600 focus:border-blue-500 focus:outline-none transition-colors">
                        <svg class="w-3.5 h-3.5 text-gray-400 absolute left-2.5 top-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <!-- Sorting widgets -->
                    <div class="flex">
                        <select id="manageSortSelect" class="flex-1 bg-gray-700 text-xs text-white p-1.5 rounded-l border border-gray-600 outline-none cursor-pointer">
                            <option value="name">Sort by: Name</option>
                            <option value="area">Sort by: Area</option>
                            <option value="distance">Sort by: Distance</option>
                            <option value="elevation">Sort by: Elevation</option>
                            <option value="angle">Sort by: Angle</option>
                            <option value="score">Sort by: Effort</option>
                        </select>
                        <button id="manageSortOrderBtn" class="bg-gray-900 hover:bg-gray-600 text-white p-1.5 border-t border-b border-r border-gray-600 rounded-r flex items-center justify-center w-10 shrink-0 transition-colors" title="Toggle Sort Direction">
                            <span id="manageSortDirectionIcon" class="text-xs font-bold">↓</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Editable List -->
            <div class="flex-1 overflow-y-auto p-2 space-y-1 scrollable" id="manageHikeList">
                <!-- List of editable trails -->
            </div>

            <!-- CSV Actions Panel -->
            <div class="p-3 border-t border-gray-700 bg-gray-900 shrink-0 space-y-2">
                <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider">CSV Data Exchange</div>
                <div class="flex gap-2">
                    <button id="exportCsvBtn" class="flex-1 py-1.5 bg-gray-700 hover:bg-gray-600 text-white rounded font-medium text-xs transition-colors flex items-center justify-center gap-1.5">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Export CSV
                    </button>
                    <label for="importCsvFile" class="flex-1 py-1.5 bg-blue-600 hover:bg-blue-500 text-white rounded font-medium text-xs transition-colors flex items-center justify-center gap-1.5 cursor-pointer text-center">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        Import CSV
                    </label>
                    <input type="file" id="importCsvFile" accept=".csv" class="hidden">
                </div>
            </div>
        </div>
    </aside>

    <!-- Custom Modal for Notifications instead of alerts -->
    <div id="customModal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-200">
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-5 max-w-md w-full mx-4 shadow-2xl">
            <h3 id="modalTitle" class="text-lg font-bold text-white mb-2">Notice</h3>
            <p id="modalBody" class="text-sm text-gray-300 mb-5 leading-relaxed"></p>
            <div class="flex justify-end gap-3">
                <button id="modalSecondaryBtn" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white text-xs rounded transition-colors hidden"></button>
                <button id="modalPrimaryBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white text-xs rounded font-semibold transition-colors">OK</button>
            </div>
        </div>
    </div>

        // --- UTILITIES ---
        function getNum(val) {
            if (typeof val === 'number') return val;
            if (!val) return 0;
            return parseFloat(val.toString().replace(/,/g, '').replace(/[^\d.-]/g, ''));
        }

        function getMetrics(hike) {
            const dist = getNum(hike.distance); // in km
            const elev = getNum(hike.elevation) / 1000; // in km
            const elevMeters = getNum(hike.elevation); // in m
            
            // Geometric calculations
            let hypotenuse = Math.sqrt(Math.pow(dist / 2, 2) + Math.pow(elev, 2));
            let angle = Math.atan(elev / (dist / 2)) * (180 / Math.PI);
            hypotenuse = Math.round(hypotenuse * 100) / 100;
            angle = Math.round(angle * 100) / 100;

            // --- PHYSIOLOGICAL EFFORT INDEX (PEI) FORMULA v2.1 ---
            const grade = dist > 0 ? (elevMeters / (dist * 500)) : 0;
            const horizontalEffort = dist * 10.0;
            const verticalEffort = (elevMeters / 100) * 15.0 * (1.0 + Math.pow(grade, 1.2) * 3.5);
            const fatigueFactor = 1.0 + 0.008 * Math.pow(dist, 1.5);

            let score = (horizontalEffort + verticalEffort) * fatigueFactor;
            score = Math.round(score * 10) / 10;

            return { hypotenuse, angle, score };
        }

        function formatDuration(decimalHours) {
            if (isNaN(decimalHours) || decimalHours <= 0) return "N/A";
            const h = Math.floor(decimalHours);
            const m = Math.round((decimalHours - h) * 60);
            if (h === 0) return `${m}m`;
            return `${h}h ${m}m`;
        }

        function calcMetrics() {
            const paceMins = parseFloat(document.getElementById('paceMinutes').value) || 0.85;
            hikes.forEach(hike => {
                const { hypotenuse, angle, score } = getMetrics(hike);
                hike.hypotenuse = hypotenuse;
                hike.angle = angle;
                hike.score = score;
                hike.estTime = (score * paceMins) / 60; 
            });
        }

        function runCalibration() {
            const selectedId = document.getElementById('calibrateHikeSelect').value;
            const hours = parseFloat(document.getElementById('calibrateHours').value);
            if (!selectedId || isNaN(hours) || hours <= 0) return;

            const hike = hikes.find(h => h.id == selectedId);
            if (hike && hike.score > 0) {
                const calculatedPace = (hours * 60) / hike.score;
                document.getElementById('paceMinutes').value = calculatedPace.toFixed(3);
                calcMetrics();
                renderList();
                drawCanvas();
            }
        }

        // --- REGION-GROUPED SELECTION PANEL ---
        function toggleRegion(regionName) {
            let targetAreas = [];
            const region = regions.find(r => r.name === regionName);

            if (region) {
                targetAreas = region.areas.filter(a => hikes.some(h => h.area === a));
            } else if (regionName === "Other Regions") {
                const activeAreas = new Set(hikes.map(h => h.area));
                const definedAreas = new Set(regions.flatMap(r => r.areas));
                targetAreas = [...activeAreas].filter(a => !definedAreas.has(a));
            }

            const allDisabled = targetAreas.every(a => disabledAreas.has(a));
            if (allDisabled) {
                // Enable all areas inside this region
                targetAreas.forEach(a => disabledAreas.delete(a));
            } else {
                // Disable all areas inside this region
                targetAreas.forEach(a => {
                    disabledAreas.add(a);
                    selectedHikes.forEach(id => {
                        const hike = hikes.find(h => h.id === id);
                        if (hike && hike.area === a) {
                            selectedHikes.delete(id);
                        }
                    });
                });
            }
            refreshAllViews();
        }

        function renderRegionFilters() {
            const container = document.getElementById('regionFilters');
            if (!container) return;
            container.innerHTML = '';

            const activeAreas = new Set(hikes.map(h => h.area));
            
            // Generate active dynamic list
            const activeRegions = regions.map(r => ({
                name: r.name,
                areas: r.areas.filter(a => activeAreas.has(a))
            })).filter(r => r.areas.length > 0);

            // Handle edge case for newly imported Custom CSV regions
            const definedAreas = new Set(regions.flatMap(r => r.areas));
            const otherAreas = [...activeAreas].filter(a => !definedAreas.has(a));

            if (otherAreas.length > 0) {
                activeRegions.push({
                    name: "Other Regions",
                    areas: otherAreas
                });
            }

            activeRegions.forEach(reg => {
                const allActive = reg.areas.filter(a => !disabledAreas.has(a));
                const isAllEnabled = allActive.length === reg.areas.length;
                const isAllDisabled = allActive.length === 0;

                let textClass = "text-gray-400 hover:text-white";
                if (isAllEnabled) textClass = "text-emerald-400 hover:text-emerald-300";
                else if (!isAllDisabled) textClass = "text-yellow-400 hover:text-yellow-300";

                const card = document.createElement('div');
                card.className = "bg-gray-900/50 border border-gray-800 rounded p-2 flex flex-col gap-1.5 transition-colors hover:border-gray-700/80";

                // Header toggler button
                const header = document.createElement('button');
                header.className = `w-full text-left text-[11px] font-bold uppercase tracking-wider ${textClass} flex justify-between items-center py-0.5 px-1 rounded hover:bg-gray-800 transition-colors`;
                header.innerHTML = `
                    <span class="truncate pr-1">${reg.name}</span>
                    <span class="text-[10px] font-mono shrink-0 bg-gray-800 px-1 py-0.2 rounded text-gray-300">${allActive.length}/${reg.areas.length}</span>
                `;
                header.onclick = () => toggleRegion(reg.name);
                card.appendChild(header);

                // Chips Container
                const chipsDiv = document.createElement('div');
                chipsDiv.className = "flex flex-wrap gap-1 mt-0.5";

                reg.areas.forEach(area => {
                    const isDisabled = disabledAreas.has(area);
                    const color = areaColors[area] || "#94A3B8";

                    const pill = document.createElement('button');
                    pill.className = `text-[11px] font-medium px-2.5 py-1 rounded-full flex items-center transition-all ${
                        isDisabled 
                        ? 'bg-gray-950/40 text-gray-500 border border-transparent opacity-40 hover:opacity-70 hover:bg-gray-900/40' 
                        : 'bg-gray-800 text-gray-200 border border-gray-700 hover:bg-gray-700 hover:text-white'
                    }`;

                    pill.innerHTML = `
                        <span class="w-1.5 h-1.5 rounded-full mr-1.5 shrink-0" style="background-color: ${color}"></span>
                        <span class="truncate max-w-[120px]">${area}</span>
                    `;

                    pill.onclick = () => {
                        if (disabledAreas.has(area)) {
                            disabledAreas.delete(area);
                        } else {
                            disabledAreas.add(area);
                            // Deselect active plotted lines under disabled area
                            selectedHikes.forEach(id => {
                                const hike = hikes.find(h => h.id === id);
                                if (hike && hike.area === area) {
                                    selectedHikes.delete(id);
                                }
                            });
                        }
                        refreshAllViews();
                    };

                    chipsDiv.appendChild(pill);
                });

                card.appendChild(chipsDiv);
                container.appendChild(card);
            });
        }

            const elevationRaw = document.getElementById('trailElevation').value;
            const area = document.getElementById('trailArea').value;
            const type = document.getElementById('trailType').value;

            const distance = parseFloat(distanceRaw);
            const elevation = parseInt(elevationRaw);

            let hikeObj;
            if (id) {
                hikeObj = hikes.find(h => h.id == id);
                if (hikeObj) {
                    hikeObj.name = name;
                    hikeObj.distance = distance;
                    hikeObj.elevation = elevation;
                    hikeObj.area = area;
                    hikeObj.type = type;
                }
            } else {
                const newId = hikes.length > 0 ? Math.max(...hikes.map(h => h.id)) + 1 : 1;
                hikeObj = { id: newId, name, distance, elevation, area, type };
                hikes.push(hikeObj);
            }

            calcMetrics();
            resetForm();
            refreshAllViews();
            populateDropdowns(); 
            populateCalibrateSelect();
        }

                    selectedHikes.delete(id);
                    if (hoveredHike && hoveredHike.id === id) hoveredHike = null;
                    
                    if (document.getElementById('trailId').value == id) {
                        resetForm();
                    }
                    
                    refreshAllViews();
                    populateDropdowns();
                    populateCalibrateSelect();
                }
            });
        }

            document.getElementById('trailForm').reset();

            document.getElementById('cancelEditBtn').classList.add('hidden');

        function toggleHike(id) {
            if (selectedHikes.has(id)) {
                selectedHikes.delete(id);
            } else {

            renderList();
            drawCanvas(); // Only redraw the canvas, do not recalculate dimensions

        // --- CSV IMPORT / EXPORT CAPABILITY ---
        function exportToCsv() {
            if (hikes.length === 0) {
                showMessage("No Data", "There are no trails available to export.");
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Name,Area,Distance,Elevation,Type\n";

            hikes.forEach(h => {
                const safeName = h.name.replace(/"/g, '""');
                const safeArea = h.area.replace(/"/g, '""');
                const safeType = h.type.replace(/"/g, '""');
                csvContent += `"${safeName}","${safeArea}",${h.distance},${h.elevation},"${safeType}"\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "vancouver_trails_dataset.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function handleCsvFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                const csvData = evt.target.result;
                parseAndImportCsv(csvData);
                e.target.value = '';
            };
            reader.readAsText(file);
        }

        function parseAndImportCsv(text) {
            const lines = text.split(/\r?\n/);
            if (lines.length <= 1) {
                showMessage("Import Failed", "The CSV file is empty or formatted incorrectly.");
                return;
            }

            function parseCsvLine(line) {
                const result = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        result.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                result.push(current.trim());
                return result;
            }

            const header = parseCsvLine(lines[0]);
            const nameIdx = header.findIndex(h => h.toLowerCase() === 'name');
            const areaIdx = header.findIndex(h => h.toLowerCase() === 'area');
            const distIdx = header.findIndex(h => h.toLowerCase() === 'distance');
            const elevIdx = header.findIndex(h => h.toLowerCase() === 'elevation');
            const typeIdx = header.findIndex(h => h.toLowerCase() === 'type');

            if (nameIdx === -1 || areaIdx === -1 || distIdx === -1 || elevIdx === -1 || typeIdx === -1) {
                showMessage("Import Error", "CSV file must contain columns: Name, Area, Distance, Elevation, and Type.");
                return;
            }

            let importCount = 0;
            let currentMaxId = hikes.length > 0 ? Math.max(...hikes.map(h => h.id)) : 0;
            const parsedHikes = [];

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i];
                if (!line.trim()) continue;

                const cols = parseCsvLine(line);
                if (cols.length < Math.max(nameIdx, areaIdx, distIdx, elevIdx, typeIdx) + 1) continue;

                const rawName = cols[nameIdx];
                const rawArea = cols[areaIdx];
                const rawDist = cols[distIdx];
                const rawElev = cols[elevIdx];
                const rawType = cols[typeIdx];

                if (!rawName || !rawArea || !rawDist || !rawElev || !rawType) continue;

                const distNum = getNum(rawDist);
                const elevNum = getNum(rawElev);

                if (isNaN(distNum) || isNaN(elevNum)) continue;

                if (!areaColors[rawArea]) {
                    areaColors[rawArea] = "#" + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
                }

                currentMaxId += 1;
                parsedHikes.push({
                    id: currentMaxId,
                    name: rawName,
                    area: rawArea,
                    distance: distNum,
                    elevation: elevNum,
                    type: rawType
                });
                importCount += 1;
            }

            if (parsedHikes.length > 0) {
                showConfirm("Confirm Import", `Successfully parsed ${importCount} trails. Do you want to append these to your current list, or completely replace them?`, 
                    () => {
                        hikes = [...hikes, ...parsedHikes];
                        finalizeImport();
                    },
                    () => {
                        showConfirm("Replace Dataset", "Would you like to REPLACE your current trail database entirely with this imported file?", () => {
                            hikes = parsedHikes;
                            selectedHikes.clear();
                            finalizeImport();
                        }, () => {});
                    }
                );
            } else {
                showMessage("Import Error", "Could not parse any valid trails from the CSV file. Please check column format and data.");
            }
        }

        function finalizeImport() {
            calcMetrics();
            refreshAllViews();
            populateDropdowns(); 
            populateCalibrateSelect();
            showMessage("Import Completed", "The trail list has been updated successfully.");
        }

        function populateDropdowns() {
            const categoricalMap = [
                { key: 'area', ids: ['trailArea'], def: 'Area: All' },
                { key: 'type', ids: ['filter-type'], def: 'Type: All' }
            ];
            
            const numericalMap = [
                { key: 'distance', ids: ['filter-distance'], def: 'Distance (km): All' },
                { key: 'elevation', ids: ['filter-elevation'], def: 'Elevation (m): All' },
                { key: 'hypotenuse', ids: ['filter-hypotenuse'], def: 'Climb (km): All' },
                { key: 'angle', ids: ['filter-angle'], def: 'Angle (&deg;): All' },
                { key: 'score', ids: ['filter-score'], def: 'Effort: All' }  
            ];
            
            categoricalMap.forEach(f => {
                f.ids.forEach(id => {
                    const select = document.getElementById(id);
                    if (!select) return;

                    // Clear options and add default placeholder only for filter dropdowns
                    select.innerHTML = id.startsWith('filter-') ? `<option value="">${f.def}</option>` : '';
                    
                    // Source values: Use the registry for Area to ensure all possible regions are listed
                    const uniqueVals = (f.key === 'area') 
                        ? Object.keys(areaColors) 
                        : [...new Set(hikes.map(h => h[f.key]))];

                    uniqueVals.sort((a, b) => a.toString().localeCompare(b.toString()));
                    
                    uniqueVals.forEach(val => {
                        const option = document.createElement('option');
                        option.value = val;
                        option.textContent = val;
                        select.appendChild(option);
                    });
                    
                    // Restore global filter state for filter elements
                    if (id.startsWith('filter-') && activeFilters[f.key]) {
                        select.value = activeFilters[f.key];
                    }
                });
            });

            numericalMap.forEach(f => {
                if(!f.ids) f.ids = [f.id];
                f.ids.forEach(id => {
                    const select = document.getElementById(id);
                    if (!select) return;
                    select.innerHTML = `<option value="">${f.def}</option>`;
                    
                    if(hikes.length === 0) return;

                    const values = hikes.map(h => getNum(h[f.key]));
                    const min = Math.min(...values);
                    const max = Math.max(...values);
                    const step = max === min ? 1 : (max - min) / 10;
                    
                    for (let i = 0; i < 10; i++) {
                        let rMin = min + i * step;
                        rMin = Math.floor(rMin);
                        let rMax = i === 9 ? max : min + (i + 1) * step;
                        rMax = Math.floor(rMax);
                        
                        const option = document.createElement('option');
                        option.value = JSON.stringify({ min: rMin, max: rMax, isLast: i === 9 });
                        
                        const dec = f.key === 'elevation' ? 0 : 1;
                        option.textContent = `${rMin.toFixed(dec)} - ${rMax.toFixed(dec)}`;
                        select.appendChild(option);
                    }
                    
                    const currentFilterVal = activeFilters[f.key];
                    if (currentFilterVal) select.value = currentFilterVal;
                });
            });
        }

        // --- CANVAS LOGIC ---
        function resizeCanvas() {
            const parent = canvas.parentElement;
            const dpr = window.devicePixelRatio || 1;
            const cw = parent.clientWidth;
            const ch = parent.clientHeight;
            
            canvas.width = cw * dpr;
            canvas.height = ch * dpr;
            canvas.style.width = cw + 'px';
            canvas.style.height = ch + 'px';
            
            ctx.setTransform(1, 0, 0, 1, 0, 0); 
            ctx.scale(dpr, dpr);
            
            originX = 60;
            originY = ch - 50;
            
            // Base maximum scale strictly on active areas, NOT individual selected trails
            const visibleHikes = hikes.filter(h => !disabledAreas.has(h.area));
            
            if (visibleHikes.length === 0) {
                drawCanvas();
                return;
            }

            // Set minimum bounding boxes to prevent extreme zooms on short hikes
            const max_X = Math.max(2.0, ...visibleHikes.map(h => h.hypotenuse * Math.cos(h.angle * Math.PI / 180)));
            const max_Y = Math.max(0.2, ...visibleHikes.map(h => h.hypotenuse * Math.sin(h.angle * Math.PI / 180)));

            currentMaxX = max_X * 1.05; // 5% inner padding
            currentMaxY = max_Y * 1.05; 
            
            // Define space strictly reserved for labels so they are never cut off
            const paddingRight = 60; 
            const paddingTop = 60;   
            
            scaleX = Math.max(0.1, cw - originX - paddingRight) / currentMaxX;
            scaleY = Math.max(0.1, originY - paddingTop) / currentMaxY;
            
            drawCanvas();
        }

        function pointToLineSegmentDistance(px, py, x1, y1, x2, y2) {
            const l2 = (x2 - x1) * (x2 - x1) + (y2 - y1) * (y2 - y1);
            if (l2 === 0) return Math.sqrt((px - x1) * (px - x1) + (py - y1) * (py - y1));
            let t = ((px - x1) * (x2 - x1) + (py - y1) * (y2 - y1)) / l2;
            t = Math.max(0, Math.min(1, t));
            const projX = x1 + t * (x2 - x1);
            const projY = y1 + t * (y2 - y1);
            return Math.sqrt((px - projX) * (px - projX) + (py - projY) * (py - projY));
        }

        function drawCanvas() {
            const cw = canvas.clientWidth;
            const ch = canvas.clientHeight;
            
            ctx.fillStyle = '#111827'; 
            ctx.fillRect(0, 0, cw, ch);
            
            drawAxes();
            
            if(hikes.length === 0) return;

            // 1. Unselected Lines (opacity 0.2)
            hikes.forEach(hike => {
                if (disabledAreas.has(hike.area)) return;
                if (!selectedHikes.has(hike.id)) drawLine(hike, 0.2);
            });
            
            // 2. Selected Lines (opacity 1.0)
            hikes.forEach(hike => {
                if (disabledAreas.has(hike.area)) return;
                if (selectedHikes.has(hike.id)) drawLine(hike, 1.0);
            });
            
            // 3. Hovered Line (glows on top)
            if (hoveredHike && !disabledAreas.has(hoveredHike.area)) {
                drawLine(hoveredHike, 1.0, true);
            }
            
            // 4. Labels for Selected Hikes
            ctx.textBaseline = "middle";
            ctx.font = "bold 11px Inter, sans-serif";
            hikes.forEach(hike => {
                if (disabledAreas.has(hike.area)) return;
                if (selectedHikes.has(hike.id)) {
                    const rad = hike.angle * Math.PI / 180;
                    const endX = originX + (hike.hypotenuse * Math.cos(rad)) * scaleX;
                    const endY = originY - (hike.hypotenuse * Math.sin(rad)) * scaleY;
                    
                    const labelText = `${hike.name}: ${hike.score}, ${hike.estTime.toFixed(1)}h`;
                    
                    let labelX = endX + 8;
                    const textWidth = ctx.measureText(labelText).width;
                    if (labelX + textWidth > cw - 10) {
                        ctx.textAlign = "right";
                        labelX = endX - 8;
                    } else {
                        ctx.textAlign = "left";
                    }
                    
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = "#111827";
                    ctx.strokeText(labelText, labelX, endY);
                    
                    ctx.fillStyle = areaColors[hike.area] || "#FFFFFF";
                    ctx.fillText(labelText, labelX, endY);
                }
            });
        }

        function drawAxes() {
            const yAxisTop = originY - (currentMaxY * scaleY);
            const xAxisRight = originX + (currentMaxX * scaleX);

            ctx.beginPath();
            ctx.moveTo(originX, originY);
            ctx.lineTo(xAxisRight, originY);
            ctx.moveTo(originX, originY);
            ctx.lineTo(originX, yAxisTop);
            
            ctx.strokeStyle = "#4B5563"; 
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Y Ticks dynamically adapting to elevation range
            ctx.fillStyle = "#9CA3AF";
            ctx.textAlign = "right";
            ctx.textBaseline = "middle";
            
            let stepY = 0.5;
            if (currentMaxY <= 0.5) stepY = 0.1;
            else if (currentMaxY <= 1.5) stepY = 0.25;
            else if (currentMaxY <= 3.0) stepY = 0.5;
            else stepY = 1.0;

            ctx.font = "10px Inter, sans-serif";
            for (let e = stepY; e <= currentMaxY; e += stepY) {
                const tickY = originY - (e * scaleY);
                
                ctx.strokeStyle = "#4B5563";
                ctx.setLineDash([]);
                ctx.beginPath();
                ctx.moveTo(originX - 5, tickY);
                ctx.lineTo(originX, tickY);
                ctx.stroke();
                
                ctx.fillText(e.toFixed(2).replace(/\.00$/, '') + "km", originX - 10, tickY);
            }
            
            ctx.textAlign = "center";
            ctx.textBaseline = "bottom";
            ctx.font = "12px Inter, sans-serif";
            ctx.fillText("Elevation (km)", originX, yAxisTop - 25);
            
            // X Ticks dynamically adapting to distance range
            let stepX = 5;
            if (currentMaxX <= 3) stepX = 0.5;
            else if (currentMaxX <= 8) stepX = 1;
            else if (currentMaxX <= 15) stepX = 2;
            else if (currentMaxX <= 30) stepX = 5;
            else stepX = 10;

            ctx.font = "10px Inter, sans-serif";
            ctx.textBaseline = "top";
            
            for (let x = stepX; x <= currentMaxX; x += stepX) {
                const px = originX + (x * scaleX);
                
                // Axis ticks
                ctx.strokeStyle = "#4B5563";
                ctx.setLineDash([]);
                ctx.beginPath();
                ctx.moveTo(px, originY);
                ctx.lineTo(px, originY + 5);
                ctx.stroke();
                
                ctx.fillText(x.toFixed(1).replace(/\.0$/, '') + "km", px, originY + 10);
                
                // Vertical distance grid markers
                ctx.strokeStyle = "rgba(75, 85, 99, 0.4)"; 
                ctx.setLineDash([4, 6]);
                ctx.beginPath();
                ctx.moveTo(px, originY);
                ctx.lineTo(px, yAxisTop);
                ctx.stroke();
            }
            
            ctx.strokeStyle = "#4B5563";
            ctx.setLineDash([]);
            ctx.font = "12px Inter, sans-serif";
            ctx.fillText("Distance (km)", originX + ((currentMaxX * scaleX) / 2), originY + 30);
            
            ctx.textAlign = "left"; 
            ctx.textBaseline = "middle";
            
            // Angle Rays
            [5, 10, 15, 20, 30, 45].forEach(deg => {
                const rad = deg * Math.PI / 180;
                
                // Ray length dynamically scaled to exactly hit the bounding box
                let r_bound = currentMaxX / Math.cos(rad);
                if (r_bound * Math.sin(rad) > currentMaxY) {
                    r_bound = currentMaxY / Math.sin(rad);
                }
                
                const endX = originX + r_bound * Math.cos(rad) * scaleX;
                const endY = originY - r_bound * Math.sin(rad) * scaleY;

                ctx.strokeStyle = "rgba(75, 85, 99, 0.5)";
                ctx.setLineDash([2, 4]);
                ctx.beginPath();
                ctx.moveTo(originX, originY);
                ctx.lineTo(endX, endY);
                ctx.stroke();

                // Labels gracefully offset without risking canvas cut-offs due to bounds
                const labelX = endX + (Math.cos(rad) * 8);
                const labelY = endY - (Math.sin(rad) * 8);
                ctx.fillStyle = "#6B7280";
                ctx.fillText(deg + "°", labelX, labelY);
            });

            ctx.setLineDash([]);
        }

        function drawLine(hike, opacity, isHovered = false) {
            const rad = hike.angle * Math.PI / 180;
            const endX = originX + (hike.hypotenuse * Math.cos(rad)) * scaleX;
            const endY = originY - (hike.hypotenuse * Math.sin(rad)) * scaleY;
            
            ctx.beginPath();
            ctx.moveTo(originX, originY);
            ctx.lineTo(endX, endY);
            
            ctx.strokeStyle = areaColors[hike.area] || "#FFFFFF";
            ctx.globalAlpha = opacity;
            ctx.lineWidth = isHovered ? 5 : (opacity === 1.0 ? 3 : 1.5);
            ctx.lineCap = "round";
            
            if (isHovered || opacity === 1.0) {
                ctx.shadowBlur = isHovered ? 15 : 8;
                ctx.shadowColor = ctx.strokeStyle;
            } else {
                ctx.shadowBlur = 0;
            }
            
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(endX, endY, isHovered ? 6 : (opacity === 1.0 ? 4 : 2), 0, Math.PI * 2);
            ctx.fillStyle = areaColors[hike.area] || "#FFFFFF";
            ctx.fill();
            
            ctx.globalAlpha = 1.0; 
            ctx.shadowBlur = 0;
        }

        // --- INTERACTIONS ---
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            let candidates = [];
            
            hikes.forEach(hike => {
                if (disabledAreas.has(hike.area)) return;
                const rad = hike.angle * Math.PI / 180;
                const lx = originX + (hike.hypotenuse * Math.cos(rad)) * scaleX;
                const ly = originY - (hike.hypotenuse * Math.sin(rad)) * scaleY;
                
                const dist = pointToLineSegmentDistance(mouseX, mouseY, originX, originY, lx, ly);
                if (dist < 12) {
                    candidates.push({ hike, dist });
                }
            });
            
            let closestHike = null;
            if (candidates.length > 0) {
                candidates.sort((a, b) => {
                    const aSel = selectedHikes.has(a.hike.id);
                    const bSel = selectedHikes.has(b.hike.id);
                    if (aSel && !bSel) return -1;
                    if (!aSel && bSel) return 1;
                    return a.dist - b.dist;
                });
                closestHike = candidates[0].hike;
            }
            
            if (closestHike !== hoveredHike) {
                hoveredHike = closestHike;
                drawCanvas();
                updateTooltipContent(mouseX, mouseY);
            } else if (hoveredHike) {
                updateTooltipPosition(mouseX, mouseY);
            }
        });

        canvas.addEventListener('mouseleave', () => {
            hoveredHike = null;
            drawCanvas();
            document.getElementById('tooltip').style.opacity = 0;
        });

        canvas.addEventListener('click', (e) => {
            if (hoveredHike) {
                toggleHike(hoveredHike.id);
            }
        });

        // Touch event support for mobile canvas interaction
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.touches[0].clientX - rect.left;
                const mouseY = e.touches[0].clientY - rect.top;
                
                let candidates = [];
                hikes.forEach(hike => {
                    if (disabledAreas.has(hike.area)) return;
                    const rad = hike.angle * Math.PI / 180;
                    const lx = originX + (hike.hypotenuse * Math.cos(rad)) * scaleX;
                    const ly = originY - (hike.hypotenuse * Math.sin(rad)) * scaleY;
                    const dist = pointToLineSegmentDistance(mouseX, mouseY, originX, originY, lx, ly);
                    if (dist < 20) {
                        candidates.push(hike);
                    }
                });

                if (candidates.length > 0) {
                    toggleHike(candidates[0].id);
                }
            }
        });

        function updateTooltipContent(x, y) {
            const tt = document.getElementById('tooltip');
            if (!hoveredHike) {
                tt.style.opacity = 0;
                return;
            }
            
            tt.innerHTML = `
                <div class="font-bold text-white flex items-center gap-2 mb-1">
                    <span class="w-3 h-3 rounded-full shadow-sm" style="background-color: ${areaColors[hoveredHike.area] || '#FFF'}"></span>
                    ${hoveredHike.name}
                </div>
                <div class="text-xs text-gray-300"><b>Area:</b> ${hoveredHike.area}</div>
                <div class="text-xs text-gray-300"><b>Type:</b> ${hoveredHike.type}</div>
                <div class="text-xs text-gray-300 mt-1"><b>Hypotenuse:</b> <span class="text-blue-300">${hoveredHike.hypotenuse} km</span></div>
                <div class="text-xs text-gray-300"><b>Angle:</b> <span class="text-red-300">${hoveredHike.angle}&deg;</span></div>
                <div class="text-xs text-yellow-300 font-semibold mt-1"><b>Est. Duration:</b> ${formatDuration(hoveredHike.estTime)}</div>
                <div class="text-xs text-gray-400 mt-2 border-t border-gray-600 pt-2 flex justify-between gap-4">
                    <span>${hoveredHike.distance.toFixed(1)} km RT</span>
                    <span>${hoveredHike.elevation.toLocaleString()} m Gain</span>
                    <span>Effort: ${hoveredHike.score}</span>
                </div>
            `;
            tt.style.opacity = 1;
            updateTooltipPosition(x, y);
        }

        function updateTooltipPosition(x, y) {
            const tt = document.getElementById('tooltip');
            let ttX = x + 15;
            let ttY = y + 15;
            
            if (ttX + 220 > canvas.clientWidth) ttX = x - 235; 
            if (ttY + 120 > canvas.clientHeight) ttY = y - 135; 
            
            tt.style.left = ttX + 'px';
            tt.style.top = ttY + 'px';
        }

        document.getElementById('exportBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'Vancouver_Hike_Comparison.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        // Initialize application on load
        window.onload = initApp;
    </script>
</body>
</html>
